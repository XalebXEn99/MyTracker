name: Build iOS unsigned IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix line endings on iOS files
        run: |
          # Aggressive line ending normalization before pod install
          python3 << 'PYTHON'
          import glob
          import os
          
          # Find ALL files in ios directory
          for root, dirs, files in os.walk('ios'):
              for file in files:
                  fpath = os.path.join(root, file)
                  # Include: pbxproj, plist, h, m, swift, Podfile, schemes
                  if any(fpath.endswith(ext) for ext in ['.pbxproj', '.plist', '.h', '.m', '.swift', 'Podfile', '.xcscheme']):
                      try:
                          with open(fpath, 'rb') as f:
                              content = f.read()
                          # Remove ALL CR characters (both CRLF and old Mac CR)
                          fixed = content.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
                          if fixed != content:
                              with open(fpath, 'wb') as f:
                                  f.write(fixed)
                              print(f"Fixed: {fpath}")
                      except Exception as e:
                          pass
          PYTHON
          echo "Line ending normalization complete"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v "~> 1.16"

      - name: Install JavaScript dependencies
        run: yarn install --ignore-engines

      - name: Clean iOS build artifacts
        run: |
          cd ios
          rm -rf Pods Podfile.lock .xcode.env build

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          echo "=== Podfile content ==="
          cat Podfile
          echo ""
          echo "=== Node modules check ==="
          ls -la ../node_modules/@react-native-mapbox-gl/maps 2>&1 | head -20 || echo "Mapbox not found yet"
          echo ""
          echo "=== Running pod install ==="
          pod install --repo-update 2>&1 || {
            echo "Pod install failed. Attempting diagnostics..."
            pod repo update
            pod install
          }

      - name: Create JS bundle
        run: |
          yarn react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

      - name: Build archive
        run: |
          cd ios
          echo "=== Xcode version ==="
          xcodebuild -version
          echo ""
          echo "=== Checking workspace ==="
          ls -la MyTracker.xcworkspace/ 2>&1 | head -10 || echo "Workspace not ready"
          echo ""
          echo "=== Starting archive ==="
          xcodebuild \
            -workspace MyTracker.xcworkspace \
            -scheme MyTracker \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -archivePath build/MyTracker.xcarchive \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual 2>&1 | tail -100 || {
            echo "Workspace build failed, trying project directly..."
            xcodebuild \
              -project MyTracker.xcodeproj \
              -scheme MyTracker \
              -configuration Release \
              -derivedDataPath build/DerivedData \
              -archivePath build/MyTracker.xcarchive \
              clean archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_STYLE=Manual 2>&1 | tail -100
          }

      - name: Export unsigned IPA
        run: |
          cd ios
          mkdir -p build/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/MyTracker.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTracker-unsigned.ipa
          path: ios/build/ipa
          retention-days: 30

