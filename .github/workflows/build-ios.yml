name: Build iOS unsigned IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Configure git to preserve LF
        run: |
          git config --global core.autocrlf false
          git config --global core.safecrlf false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: false

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v "~> 1.16"

      - name: Install JavaScript dependencies
        run: yarn install --ignore-engines

      - name: Clean iOS build artifacts
        run: |
          cd ios
          rm -rf Pods Podfile.lock .xcode.env build

      - name: Validate plists
        run: bash scripts/ci-validate-plists.sh

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update -v 2>&1 | tee pod_install.log || {
            echo "=== POD INSTALL FAILED ==="
            tail -100 pod_install.log
            echo "=== Searching for plist-related errors ==="
            grep -i "plist\|nanaimo" pod_install.log || echo "No plist errors found in log"
            exit 1
          }

      - name: Create JS bundle
        run: |
          yarn react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

      - name: Build archive
        run: |
          cd ios
          xcodebuild \
            -workspace MyTracker.xcworkspace \
            -scheme MyTracker \
            -configuration Release \
            -archivePath build/MyTracker.xcarchive \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual

      - name: Export unsigned IPA
        run: |
          cd ios
          mkdir -p build/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/MyTracker.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTracker-unsigned.ipa
          path: ios/build/ipa
          retention-days: 30

